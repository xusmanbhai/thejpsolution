[build]
  command = "npm ci && npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--include=dev"

[[redirects]]
  from = "/api/consultation"
  to = "/.netlify/functions/consultation"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
